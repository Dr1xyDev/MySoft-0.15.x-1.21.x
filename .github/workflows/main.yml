name: Server Startup & Backup

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'PocketMine-MP.phar'
      - 'bin/**'
      - '.github/workflows/server-backup.yml'

jobs:
  startup-and-backup:
    name: Start Server & Create Backup
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Verify PocketMine-MP.phar exists
        run: |
          if [ ! -f "PocketMine-MP.phar" ]; then
            echo "❌ ERROR: PocketMine-MP.phar not found!"
            exit 1
          fi
          echo "✅ PocketMine-MP.phar found"
          ls -lh PocketMine-MP.phar

      - name: Check for compiled PHP binary
        id: check-php
        run: |
          if [ -f "bin/php7/bin/php" ]; then
            echo "php_found=true" >> $GITHUB_OUTPUT
            echo "✅ Compiled PHP binary found in bin/php7/bin/php"
            ./bin/php7/bin/php -v
          else
            echo "php_found=false" >> $GITHUB_OUTPUT
            echo "⚠️ Using system PHP instead"
            php -v
          fi

      - name: Create server directory structure
        run: |
          mkdir -p server/worlds
          mkdir -p server/players
          mkdir -p plugins
          echo "✅ Server directories created"
          tree -L 2 . || find . -maxdepth 2 -type d

      - name: Create server.properties
        run: |
          cat > server/server.properties << 'EOFPROPS'
#Properties Config file
#Generated by GitHub Actions
allow-flight=off
allow-list=off
announce-player-achievements=on
auto-save=on
broadcast-console-to-ops=on
broadcast-rcon-to-ops=on
debug=off
default-game-mode=0
default-player-permission-level=1
difficulty=1
enable-command-block=off
enable-rcon=off
enable-query=on
force-gamemode=off
gamemode=0
generator-settings=
hardcore=off
host-ip=0.0.0.0
ipc.port=0
language=eng
level-name=world
level-seed=
level-type=DEFAULT
max-build-height=256
max-players=20
max-tick-time=60000
memory-limit=-1
motd=§cGitHub Actions §bServer
network-compression-level=6
network-compression-threshold=256
online-mode=off
op-permission-level=4
player-data-serializer=nbt
player-movement-action-permission-level=2
player-seed-format=OptionalUUID
plugin-yansi=off
port.ipv4=19132
port.ipv6=19133
query.port=19132
rcon.password=
rcon.port=19132
resource-packs=
resource-stack-size=512
server-authoritative-block-breaking=true
server-authoritative-movement=server
server-authoritative-movement-redhstone-redstone=true
server-name=GitHub Actions Server
server-port=19132
server-port-v6=19133
show-coordinates=on
spawn-animals=on
spawn-monsters=on
spawn-npcs=on
text-filtering-enabled=false
tick-sleep=1
tls-key-agreement=on
use-native-inventory=off
view-distance=8
whitelist=off
xbox-auth=off
EOFPROPS
          echo "✅ server.properties created"
          ls -lh server/server.properties

      - name: Create pocketmine.yml
        run: |
          cat > server/pocketmine.yml << 'EOFYML'
# PocketMine settings

settings:
  shutdown-message: "Server closed"
  query-plugins: on
  enable-rcon: false
  rcon:
    password: ""
    threads: 1
    max-sockets: 32
    max-concurrent-clients: 8

console:
  default-level: info

debug:
  level: 1
  commands: off

network:
  batch-threshold: 256
  compression-level: 6
  use-encryption: true
  compression: deflate

performance:
  max-ticks-per-second: 20
  auto-report-crashes: true
  auto-save-interval: 6000
  player-data-serializer: nbt

world-settings:
  default:
    difficulty: 1
    force-gamemode: false

timings:
  enabled: false
  verbose: false
  privacy: false
  auto-save: true
  max-tick-usage: 95
  histograms: false
EOFYML
          echo "✅ pocketmine.yml created"

      - name: Start PocketMine-MP Server (1 minute)
        id: server-run
        timeout-minutes: 3
        run: |
          # Determinar qué PHP usar
          if [ -f "bin/php7/bin/php" ]; then
            PHP_BINARY="./bin/php7/bin/php"
            echo "📝 Using compiled PHP binary"
          else
            PHP_BINARY="php"
            echo "📝 Using system PHP"
          fi
          
          echo "================================"
          echo "🚀 STARTING POCKETMINE-MP SERVER"
          echo "================================"
          echo "PHP Binary: $PHP_BINARY"
          echo "Working Directory: $(pwd)"
          echo "Server Data: ./server"
          echo "Plugins: ./plugins"
          echo "================================"
          echo ""
          
          # Crear archivo de control
          touch /tmp/server_running
          
          # Iniciar servidor en background y capturar salida
          (
            $PHP_BINARY PocketMine-MP.phar \
              --no-wizard \
              --data=./server \
              --plugins=./plugins \
              2>&1 | tee server.log
            
            # Cuando termina el servidor, eliminar archivo de control
            rm -f /tmp/server_running
          ) &
          
          SERVER_PID=$!
          echo "server_pid=$SERVER_PID" >> $GITHUB_OUTPUT
          echo "Server PID: $SERVER_PID"
          
          # Esperar a que el servidor inicie correctamente (máximo 15 segundos)
          echo ""
          echo "⏳ Esperando a que el servidor inicie..."
          STARTUP_TIMEOUT=0
          MAX_STARTUP_TIME=15
          
          while [ $STARTUP_TIMEOUT -lt $MAX_STARTUP_TIME ]; do
            if [ -f "server.log" ] && grep -q "Server running" server.log; then
              echo "✅ Servidor iniciado correctamente"
              break
            fi
            
            if ! ps -p $SERVER_PID > /dev/null 2>&1; then
              echo "❌ El proceso del servidor se cerró inesperadamente"
              echo "=== SERVER LOG ==="
              cat server.log || echo "No log found"
              exit 1
            fi
            
            sleep 1
            STARTUP_TIMEOUT=$((STARTUP_TIMEOUT + 1))
          done
          
          if [ ! -f "server.log" ] || ! grep -q "Server running" server.log; then
            echo "⚠️ El servidor puede no haber iniciado completamente"
            echo "=== PARTIAL LOG ==="
            head -50 server.log || echo "No log found"
          fi
          
          # El servidor ya está corriendo, ahora esperar 1 minuto
          echo ""
          echo "================================"
          echo "🟢 SERVER IS RUNNING"
          echo "================================"
          
          # Contador de tiempo con actualización cada 10 segundos
          for i in {1..6}; do
            ELAPSED=$((i * 10))
            echo "⏱️  $ELAPSED / 60 segundos"
            
            # Verificar que el servidor sigue vivo
            if ! ps -p $SERVER_PID > /dev/null 2>&1; then
              echo "⚠️ Server process died at $ELAPSED seconds"
              echo "=== FINAL LOG ==="
              tail -50 server.log
              break
            fi
            
            # Mostrar líneas nuevas del log
            if [ -f "server.log" ]; then
              CURRENT_LINES=$(wc -l < server.log)
              echo "📝 Log lines: $CURRENT_LINES"
            fi
            
            sleep 10
          done
          
          echo ""
          echo "✅ 60 seconds completed"
          echo ""
          
          # Guardar PID para el siguiente step
          echo "$SERVER_PID" > /tmp/server.pid

      - name: Stop Server Gracefully
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            SERVER_PID=$(cat /tmp/server.pid)
            
            if ps -p $SERVER_PID > /dev/null 2>&1; then
              echo "🛑 Stopping server (PID: $SERVER_PID)..."
              
              # Enviar señal SIGTERM
              kill -TERM $SERVER_PID 2>/dev/null || true
              
              # Esperar a que cierre (máximo 20 segundos)
              STOP_TIMEOUT=0
              while [ $STOP_TIMEOUT -lt 20 ]; do
                if ! ps -p $SERVER_PID > /dev/null 2>&1; then
                  echo "✅ Server stopped gracefully"
                  break
                fi
                sleep 1
                STOP_TIMEOUT=$((STOP_TIMEOUT + 1))
              done
              
              # Si sigue vivo, matar forzadamente
              if ps -p $SERVER_PID > /dev/null 2>&1; then
                echo "⚠️ Force killing server..."
                kill -9 $SERVER_PID 2>/dev/null || true
                sleep 2
              fi
            fi
          fi
          
          # Mostrar log final
          echo ""
          echo "=== FINAL SERVER LOG (últimas 50 líneas) ==="
          tail -50 server.log || echo "No log available"

      - name: Verify Generated Files
        if: always()
        run: |
          echo "=== ARCHIVOS GENERADOS ==="
          echo ""
          
          echo "📁 Estructura de directorios:"
          find server -type f -o -type d | head -30 || echo "No files found"
          
          echo ""
          echo "📊 Tamaños:"
          du -sh server 2>/dev/null || echo "server/ not found"
          du -sh plugins 2>/dev/null || echo "plugins/ not found"
          du -sh bin 2>/dev/null || echo "bin/ not found"
          
          echo ""
          echo "📋 Archivos principales:"
          [ -f "server/server.properties" ] && echo "✅ server/server.properties" || echo "❌ server/server.properties"
          [ -f "server/pocketmine.yml" ] && echo "✅ server/pocketmine.yml" || echo "❌ server/pocketmine.yml"
          [ -d "server/worlds" ] && echo "✅ server/worlds/" || echo "❌ server/worlds/"
          [ -d "server/players" ] && echo "✅ server/players/" || echo "❌ server/players/"
          [ -d "plugins" ] && echo "✅ plugins/" || echo "❌ plugins/"
          [ -f "PocketMine-MP.phar" ] && echo "✅ PocketMine-MP.phar" || echo "❌ PocketMine-MP.phar"
          [ -d "bin" ] && echo "✅ bin/" || echo "❌ bin/"

      - name: Create Backup Structure
        if: always()
        run: |
          echo "📦 Creating backup structure..."
          
          mkdir -p backup
          
          # Copiar todos los datos del servidor
          echo "Copying server data..."
          cp -r server backup/server 2>/dev/null || echo "Warning: Could not copy server"
          
          echo "Copying plugins..."
          cp -r plugins backup/plugins 2>/dev/null || echo "Warning: Could not copy plugins"
          
          echo "Copying PocketMine-MP.phar..."
          cp PocketMine-MP.phar backup/ 2>/dev/null || echo "Warning: Could not copy phar"
          
          echo "Copying bin directory..."
          cp -r bin backup/bin 2>/dev/null || echo "Warning: Could not copy bin"
          
          echo "Copying server log..."
          [ -f "server.log" ] && cp server.log backup/server.log || true
          
          echo ""
          echo "✅ Backup structure created:"
          ls -lh backup/ || true
          du -sh backup || true

      - name: Compress Backup to tar.gz
        if: always()
        run: |
          echo "📦 Compressing backup to backupserver.tar.gz..."
          
          cd backup
          
          # Crear tar.gz preservando permisos
          tar --preserve-permissions \
              --verbose \
              -czf ../backupserver.tar.gz \
              . 2>&1 | head -100 || true
          
          cd ..
          
          echo ""
          echo "✅ Backup compressed:"
          ls -lh backupserver.tar.gz
          
          # Verificar integridad del archivo
          echo ""
          echo "🔍 Verificando integridad del archivo..."
          tar -tzf backupserver.tar.gz | head -20 || true
          
          echo ""
          echo "📊 Contenido del backup:"
          tar -tzf backupserver.tar.gz | wc -l
          echo "archivos/directorios en el backup"

      - name: Upload Backup as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Server-Backup
          path: backupserver.tar.gz
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Server Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Server-Log
          path: server.log
          retention-days: 7
          if-no-files-found: warn

      - name: Create Release with Backup
        if: always() && hashFiles('backupserver.tar.gz') != ''
        uses: softprops/action-gh-release@v1
        with:
          files: backupserver.tar.gz
          tag_name: server-backup-${{ github.run_number }}
          name: Server Backup #${{ github.run_number }}
          body: |
            🎮 **Server Backup**
            
            - **Build**: ${{ github.run_number }}
            - **Timestamp**: ${{ github.event.head_commit.timestamp }}
            - **Commit**: ${{ github.sha }}
            
            ### 📦 Contenido:
            - ✅ Datos del servidor (`server/`)
            - ✅ Plugins (`plugins/`)
            - ✅ PocketMine-MP.phar
            - ✅ Binario compilado (`bin/`)
            - ✅ Logs del servidor
            
            ### 📝 Archivos generados:
            - `server/server.properties`
            - `server/pocketmine.yml`
            - `server/worlds/`
            - `server/players/`
            - `server.log`
            
            **Descargar**: Haz clic en `backupserver.tar.gz` abajo ⬇️
          draft: false
          prerelease: false

      - name: Summary
        if: always()
        run: |
          echo ""
          echo "╔════════════════════════════════════════════╗"
          echo "║       ✅ WORKFLOW COMPLETADO               ║"
          echo "╚════════════════════════════════════════════╝"
          echo ""
          echo "📊 Resumen:"
          echo "  • Servidor iniciado por: 60 segundos"
          echo "  • Archivos generados: servidor + datos"
          echo "  • Backup comprimido: backupserver.tar.gz"
          echo "  • Formato: tar.gz (preserva permisos)"
          echo ""
          echo "📥 Artefactos disponibles:"
          echo "  • Server-Backup (backupserver.tar.gz)"
          echo "  • Server-Log (server.log)"
          echo ""
          echo "🔗 Descargar en: Actions > Artifacts"
