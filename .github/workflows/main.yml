name: Backup Server PocketMine (1 minuto)

on:
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4

      - name: 🔧 Preparar binario PHP y permisos
        run: |
          chmod +x bin/php7/bin/php 2>/dev/null || true
          chmod +x PocketMine-MP.phar 2>/dev/null || true

      - name: ⚙️ Configuración inicial (evita wizard)
        run: |
          mkdir -p worlds plugins players resource_packs logs
          cat > server.properties << 'EOF'
          server-name=MySoft Server - Backup GitHub
          gamemode=survival
          difficulty=normal
          spawn-protection=0
          max-players=10
          online-mode=false
          white-list=false
          EOF

      - name: 🚀 Iniciar servidor por exactamente 1 minuto
        run: |
          echo "=== Iniciando PocketMine-MP (src + binario) ==="
          timeout 65s ./bin/php7/bin/php PocketMine-MP.phar --no-wizard --disable-ansi || true
          echo "=== Servidor detenido ==="
          sleep 5

      - name: 🛑 Matar procesos PHP restantes
        run: pkill -f "php.*PocketMine" || true
        if: always()

      - name: 💾 Crear backupserver.tar.hz (TODO + permisos)
        run: |
          echo "=== Creando backup completo del servidor ==="

          # Copia limpia a carpeta temporal (evita el error "file changed")
          mkdir -p /tmp/server-backup
          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='logs' \
            --exclude='crashdumps' \
            --exclude='*.log' \
            --exclude='backupserver.tar.hz' \
            ./ /tmp/server-backup/

          # Comprimir desde la copia estática (manteniendo permisos)
          cd /tmp/server-backup
          tar -cpzf $GITHUB_WORKSPACE/backupserver.tar.hz .

          echo "✅ Backup creado: backupserver.tar.hz"
          echo "Tamaño: $(du -h $GITHUB_WORKSPACE/backupserver.tar.hz | cut -f1)"

      - name: 📤 Subir backup (para descargar)
        uses: actions/upload-artifact@v4
        with:
          name: backupserver
          path: backupserver.tar.hz
          retention-days: 30
