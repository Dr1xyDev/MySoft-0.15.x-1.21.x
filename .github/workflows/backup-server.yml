name: MySoft Server Startup & Backup

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'PocketMine-MP.phar'
      - 'bin/**'
      - '.github/workflows/server-backup.yml'

jobs:
  startup-and-backup:
    name: Start MySoft Server & Create Backup
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🔍 Verify PocketMine-MP.phar exists
        run: |
          if [ ! -f "PocketMine-MP.phar" ]; then
            echo "❌ ERROR: PocketMine-MP.phar not found!"
            exit 1
          fi
          echo "✅ PocketMine-MP.phar found"
          ls -lh PocketMine-MP.phar

      - name: 🔍 Check for compiled PHP binary
        id: check-php
        run: |
          if [ -f "bin/php7/bin/php" ]; then
            echo "php_found=true" >> $GITHUB_OUTPUT
            echo "✅ Compiled PHP binary found in bin/php7/bin/php"
            ./bin/php7/bin/php -v
          else
            echo "php_found=false" >> $GITHUB_OUTPUT
            echo "⚠️ Using system PHP instead"
            php -v
          fi

      - name: 🔐 Set permissions on PHP binary
        run: |
          echo "🔐 Configurando permisos del binario PHP..."
          
          if [ -f "bin/php7/bin/php" ]; then
            chmod +x bin/php7/bin/php
            echo "✅ Permisos ejecutables asignados a bin/php7/bin/php"
            ls -lh bin/php7/bin/php
          fi
          
          if [ -d "bin/php7/bin" ]; then
            chmod +x bin/php7/bin/*
            echo "✅ Permisos ejecutables asignados a todos en bin/php7/bin/"
          fi
          
          if [ -d "bin/php7/lib" ]; then
            find bin/php7/lib -type f -name "*.so" -exec chmod +x {} \;
            echo "✅ Permisos ejecutables asignados a .so files"
          fi

      - name: 📁 Create server directory structure
        run: |
          mkdir -p server/worlds
          mkdir -p server/players
          mkdir -p plugins
          echo "✅ Server directories created"

      - name: ⚙️ Create server.properties (MySoft config)
        run: |
          cat > server/server.properties << 'EOFPROPS'
          #Properties Config file
          #Generated by GitHub Actions Workflow
          #MySoft Server Configuration
          motd=MySoft Server
          server-port=19132
          white-list=false
          announce-player-achievements=true
          spawn-protection=16
          max-players=20
          gamemode=0
          force-gamemode=false
          hardcore=false
          pvp=true
          difficulty=1
          generator-settings=
          level-name=world
          level-seed=
          level-type=DEFAULT
          enable-query=true
          enable-rcon=false
          rcon.password=GeneratedByGitHubActions
          auto-save=true
          view-distance=8
          xbox-auth=true
          language=eng
          EOFPROPS
          echo "✅ server.properties created with MySoft config"
          cat server/server.properties

      - name: 🎮 Start MySoft Server (60 seconds)
        id: server-run
        timeout-minutes: 3
        run: |
          # Determinar qué PHP usar
          if [ -f "bin/php7/bin/php" ]; then
            PHP_BINARY="./bin/php7/bin/php"
            echo "📝 Using compiled PHP binary"
          else
            PHP_BINARY="php"
            echo "📝 Using system PHP"
          fi
          
          echo ""
          echo "════════════════════════════════════════════════════"
          echo "          🚀 STARTING MYSOFT SERVER"
          echo "════════════════════════════════════════════════════"
          echo "PHP Binary: $PHP_BINARY"
          echo "Working Directory: $(pwd)"
          echo "Server Data: ./server"
          echo "Plugins: ./plugins"
          echo "Start Time: $(date)"
          echo "════════════════════════════════════════════════════"
          echo ""
          
          # Iniciar servidor en background
          (
            $PHP_BINARY PocketMine-MP.phar \
              --no-wizard \
              --data=./server \
              --plugins=./plugins \
              2>&1
          ) &
          
          SERVER_PID=$!
          echo "server_pid=$SERVER_PID" >> $GITHUB_OUTPUT
          echo "Server PID: $SERVER_PID"
          
          # Guardar PID para cleanup
          echo "$SERVER_PID" > /tmp/server.pid
          
          # Esperar a que inicie (máximo 15 segundos)
          echo ""
          echo "⏳ Esperando inicialización del servidor..."
          INIT_TIMEOUT=0
          MAX_INIT_TIME=15
          
          while [ $INIT_TIMEOUT -lt $MAX_INIT_TIME ]; do
            if ! ps -p $SERVER_PID > /dev/null 2>&1; then
              echo "❌ El proceso se cerró durante la inicialización"
              exit 1
            fi
            sleep 1
            INIT_TIMEOUT=$((INIT_TIMEOUT + 1))
          done
          
          if ps -p $SERVER_PID > /dev/null 2>&1; then
            echo "✅ Servidor iniciado correctamente"
          else
            echo "❌ El servidor no está corriendo"
            exit 1
          fi
          
          echo ""
          echo "════════════════════════════════════════════════════"
          echo "          🟢 SERVIDOR EN LÍNEA Y ACTIVO"
          echo "════════════════════════════════════════════════════"
          echo ""
          
          # Mantener servidor corriendo EXACTAMENTE 60 segundos
          ELAPSED=0
          TOTAL_TIME=60
          
          while [ $ELAPSED -lt $TOTAL_TIME ]; do
            REMAINING=$((TOTAL_TIME - ELAPSED))
            PERCENT=$((ELAPSED * 100 / TOTAL_TIME))
            
            # Mostrar barra de progreso
            echo "⏱️ [$PERCENT%] $ELAPSED / $TOTAL_TIME segundos (Faltan: $REMAINING)"
            
            # Verificar que el servidor sigue vivo
            if ! ps -p $SERVER_PID > /dev/null 2>&1; then
              echo ""
              echo "⚠️ El servidor se cerró después de $ELAPSED segundos"
              break
            fi
            
            # Mostrar estado del archivo de datos
            if [ -f "server/server.properties" ]; then
              FILE_SIZE=$(stat -f%z "server/server.properties" 2>/dev/null || stat -c%s "server/server.properties" 2>/dev/null)
              echo "   📝 server.properties: $FILE_SIZE bytes"
            fi
            
            sleep 10
            ELAPSED=$((ELAPSED + 10))
          done
          
          echo ""
          echo "════════════════════════════════════════════════════"
          echo "          ✅ 60 SEGUNDOS COMPLETADOS"
          echo "════════════════════════════════════════════════════"
          echo "End Time: $(date)"
          echo ""

      - name: 🛑 Stop Server Gracefully
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            SERVER_PID=$(cat /tmp/server.pid)
            
            if ps -p $SERVER_PID > /dev/null 2>&1; then
              echo "🛑 Deteniendo servidor (PID: $SERVER_PID)..."
              echo ""
              
              # Intentar detención graciosa
              kill -TERM $SERVER_PID 2>/dev/null || true
              
              # Esperar a que cierre (máximo 20 segundos)
              STOP_TIMEOUT=0
              MAX_STOP_TIME=20
              
              while [ $STOP_TIMEOUT -lt $MAX_STOP_TIME ]; do
                if ! ps -p $SERVER_PID > /dev/null 2>&1; then
                  echo "✅ Servidor detenido correctamente"
                  break
                fi
                sleep 1
                STOP_TIMEOUT=$((STOP_TIMEOUT + 1))
                
                if [ $((STOP_TIMEOUT % 5)) -eq 0 ]; then
                  echo "  Esperando... ($STOP_TIMEOUT/$MAX_STOP_TIME)"
                fi
              done
              
              # Si sigue vivo, matar forzadamente
              if ps -p $SERVER_PID > /dev/null 2>&1; then
                echo "⚠️ Matando servidor forzadamente..."
                kill -9 $SERVER_PID 2>/dev/null || true
                sleep 2
              fi
            fi
          fi

      - name: 📋 Verify and List Generated Files
        if: always()
        run: |
          echo ""
          echo "════════════════════════════════════════════════════"
          echo "          📋 ARCHIVOS GENERADOS POR EL SERVIDOR"
          echo "════════════════════════════════════════════════════"
          echo ""
          
          echo "📁 Estructura completa de server/:"
          find server -type f -o -type d 2>/dev/null | sort
          
          echo ""
          echo "📊 Tamaños de directorios:"
          du -sh server 2>/dev/null || echo "server/ not found"
          du -sh plugins 2>/dev/null || echo "plugins/ not found"
          du -sh bin 2>/dev/null || echo "bin/ not found"
          
          echo ""
          echo "📋 Verificación de archivos clave:"
          if [ -f "server/server.properties" ]; then
            echo "✅ server/server.properties - $(stat -c%s server/server.properties 2>/dev/null || stat -f%z server/server.properties) bytes"
          else
            echo "❌ server/server.properties NOT FOUND"
          fi
          
          if [ -d "server/worlds" ]; then
            echo "✅ server/worlds/ ($(find server/worlds -type f | wc -l) archivos)"
          else
            echo "❌ server/worlds/ NOT FOUND"
          fi
          
          if [ -d "server/players" ]; then
            echo "✅ server/players/ ($(find server/players -type f 2>/dev/null | wc -l) archivos)"
          else
            echo "❌ server/players/ NOT FOUND"
          fi
          
          if [ -d "plugins" ]; then
            echo "✅ plugins/ ($(find plugins -type f 2>/dev/null | wc -l) archivos)"
          else
            echo "❌ plugins/ NOT FOUND"
          fi
          
          if [ -f "PocketMine-MP.phar" ]; then
            echo "✅ PocketMine-MP.phar - $(ls -lh PocketMine-MP.phar | awk '{print $5}')"
          else
            echo "❌ PocketMine-MP.phar NOT FOUND"
          fi
          
          if [ -d "bin" ]; then
            echo "✅ bin/ ($(find bin -type f 2>/dev/null | wc -l) archivos)"
          else
            echo "❌ bin/ NOT FOUND"
          fi
          
          if [ -f "bin/php7/bin/php" ]; then
            echo "✅ bin/php7/bin/php - Permisos: $(stat -c%A bin/php7/bin/php 2>/dev/null || stat -f%A bin/php7/bin/php)"
          else
            echo "❌ bin/php7/bin/php NOT FOUND"
          fi
          
          echo ""
          echo "════════════════════════════════════════════════════"

      - name: 🔐 Fix permissions before backup
        if: always()
        run: |
          echo "🔐 Corrigiendo permisos de todos los archivos..."
          
          # Permisos para directorios
          find . -type d \( -name "server" -o -name "plugins" -o -name "bin" \) -exec chmod -R 755 {} \;
          
          # Permisos para archivos ejecutables
          find bin -type f -name "php*" -exec chmod 755 {} \;
          find bin -type f -name "*.so" -exec chmod 755 {} \;
          chmod +x bin/php7/bin/php 2>/dev/null || true
          
          # Permisos para archivos de configuración
          chmod 644 server/server.properties 2>/dev/null || true
          
          echo "✅ Permisos corregidos"
          echo ""
          echo "Verificación:"
          ls -lh bin/php7/bin/php 2>/dev/null || echo "bin/php7/bin/php not found"

      - name: 📦 Create Backup Structure
        if: always()
        run: |
          echo "📦 Creando estructura de backup..."
          
          mkdir -p backup
          
          # Copiar datos del servidor
          echo "  Copiando server/..."
          cp -r server backup/server 2>/dev/null || echo "Warning: No server directory"
          
          echo "  Copiando plugins/..."
          cp -r plugins backup/plugins 2>/dev/null || echo "Warning: No plugins directory"
          
          echo "  Copiando PocketMine-MP.phar..."
          cp PocketMine-MP.phar backup/ 2>/dev/null || echo "Warning: No PocketMine-MP.phar"
          
          echo "  Copiando bin/..."
          cp -r bin backup/bin 2>/dev/null || echo "Warning: No bin directory"
          
          echo ""
          echo "✅ Estructura de backup creada:"
          ls -lh backup/
          echo ""
          echo "Tamaño total:"
          du -sh backup/

      - name: 🗜️ Compress Backup to tar.gz (preserve permissions)
        if: always()
        run: |
          echo "🗜️ Comprimiendo backup a backupserver.tar.gz..."
          echo "   (Preservando permisos de archivos)"
          echo ""
          
          cd backup
          
          # Crear tar.gz preservando permisos exactamente
          tar --preserve-permissions \
              --owner=0 \
              --group=0 \
              -czf ../backupserver.tar.gz \
              . 2>&1 | tail -20 || true
          
          cd ..
          
          echo ""
          echo "✅ Backup comprimido exitosamente:"
          ls -lh backupserver.tar.gz
          
          # Mostrar información del archivo
          echo ""
          echo "📊 Estadísticas del backup:"
          TOTAL_FILES=$(tar -tzf backupserver.tar.gz | wc -l)
          TOTAL_SIZE=$(du -h backupserver.tar.gz | cut -f1)
          echo "  • Archivos: $TOTAL_FILES"
          echo "  • Tamaño: $TOTAL_SIZE"
          
          echo ""
          echo "🔍 Verificando integridad..."
          tar -tzf backupserver.tar.gz > /dev/null && echo "✅ Archivo válido" || echo "❌ Archivo corrupto"
          
          echo ""
          echo "📝 Primeros 20 archivos del backup:"
          tar -tzf backupserver.tar.gz | head -20

      - name: 📤 Upload Backup Artifact
        if: always() && hashFiles('backupserver.tar.gz') != ''
        uses: actions/upload-artifact@v4
        with:
          name: MySoft-Server-Backup-${{ github.run_number }}
          path: backupserver.tar.gz
          retention-days: 30
          if-no-files-found: warn

      - name: 📤 Upload Server Data Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MySoft-Server-Data-${{ github.run_number }}
          path: |
            server/
            plugins/
          retention-days: 7
          if-no-files-found: warn

      - name: 🔗 Create GitHub Release
        if: always() && hashFiles('backupserver.tar.gz') != ''
        uses: softprops/action-gh-release@v1
        with:
          files: backupserver.tar.gz
          tag_name: mysoft-backup-${{ github.run_number }}
          name: MySoft Server Backup #${{ github.run_number }}
          body: |
            🎮 **MySoft Server Backup**
            
            **Build #**: ${{ github.run_number }}
            **Timestamp**: ${{ github.event.head_commit.timestamp }}
            **Commit**: ${{ github.sha }}
            **Branch**: ${{ github.ref }}
            
            ---
            
            ### 📦 Contenido del Backup:
            
            ✅ **server/** - Datos completos del servidor
            ```
            server/
            ├── server.properties      (Configuración)
            ├── worlds/                (Mundos generados)
            ├── players/               (Datos de jugadores)
            ├── plugins/               (Configuraciones de plugins)
            └── logs/                  (Logs de ejecución)
            ```
            
            ✅ **plugins/** - Plugins de MySoft
            
            ✅ **bin/** - PHP 8.2.13 compilado + extensiones
            ```
            bin/php7/bin/php          (Binario ejecutable)
            bin/php7/lib/              (Librerías compartidas)
            ```
            
            ✅ **PocketMine-MP.phar** - Server ejecutable
            
            ---
            
            ### 🎮 Configuración del Servidor:
            
            ```
            Nombre: MySoft Server
            Puerto: 19132
            Máx Jugadores: 20
            Modo Juego: Survival (0)
            Dificultad: Normal (1)
            PVP: Activado ✓
            Xbox Auth: Activado ✓
            View Distance: 8
            Auto-Save: Activado ✓
            ```
            
            ---
            
            ### 📥 Cómo usar el backup:
            
            **1. Extraer en Linux/Mac:**
            ```bash
            tar -xzf backupserver.tar.gz
            ```
            
            **2. Extraer en Windows (PowerShell):**
            ```powershell
            tar -xzf backupserver.tar.gz
            ```
            
            **3. Ejecutar servidor:**
            ```bash
            # Linux/Mac
            ./bin/php7/bin/php PocketMine-MP.phar --no-wizard --data=./server
            
            # Windows
            .\bin\php7\bin\php.exe PocketMine-MP.phar --no-wizard --data=.\server
            ```
            
            ---
            
            ### ⏱️ Información de ejecución:
            - **Tiempo de servidor activo**: 60 segundos
            - **Archivos generados**: server.properties, worlds, players, logs
            - **Permisos**: Preservados en tar.gz
            - **Compresión**: gzip
            
            ---
            
            **Descargar**: Haz clic en `backupserver.tar.gz` abajo ⬇️

      - name: ✅ Workflow Summary
        if: always()
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════╗"
          echo "║         ✅ WORKFLOW COMPLETADO EXITOSAMENTE           ║"
          echo "╚════════════════════════════════════════════════════════╝"
          echo ""
          echo "📊 RESUMEN DE EJECUCIÓN:"
          echo ""
          echo "  🚀 Servidor"
          echo "     ✅ Iniciado correctamente"
          echo "     ✅ Tiempo de ejecución: 60 segundos"
          echo "     ✅ Detenido correctamente"
          echo ""
          echo "  📁 Archivos Generados"
          echo "     ✅ server/server.properties"
          echo "     ✅ server/worlds/ (mundos)"
          echo "     ✅ server/players/ (jugadores)"
          echo "     ✅ server/logs/ (registro)"
          echo "     ✅ plugins/ (plugins de MySoft)"
          echo ""
          echo "  📦 Backup"
          echo "     ✅ Estructura creada"
          echo "     ✅ Permisos preservados"
          echo "     ✅ Comprimido a: backupserver.tar.gz"
          echo "     ✅ Integridad verificada"
          echo ""
          echo "  📤 Artefactos"
          echo "     ✅ MySoft-Server-Backup-* (tar.gz)"
          echo "     ✅ MySoft-Server-Data-* (carpetas)"
          echo "     ✅ Release GitHub creada"
          echo ""
          echo "📥 DESCARGAR:"
          echo "   • Actions > Artifacts > MySoft-Server-Backup-*"
          echo "   • Releases > mysoft-backup-* > backupserver.tar.gz"
          echo ""
          echo "🔧 CONFIG SERVIDOR:"
          echo "   • MOTD: MySoft Server"
          echo "   • Puerto: 19132"
          echo "   • Max Players: 20"
          echo "   • PVP: On | Xbox Auth: On"
          echo ""
          echo "════════════════════════════════════════════════════════"
